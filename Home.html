<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home of AI | Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="router.js"></script>
    <style>
        :root {
            --bg-deep: #05080f;
            --bg-surface: #0a0f1a;
            --bg-card: #0d1320;
            --bg-card-hover: #111827;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --accent: #6c5ce7;
            --accent-glow: #a78bfa;
            --accent2: #06b6d4;
            --accent2-glow: #22d3ee;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-card: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(10, 15, 26, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 36px;
            --shadow-glow: 0 0 60px rgba(108, 92, 231, 0.15);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
            --transition-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* --- Ambient Background --- */
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: -1;
            opacity: 0.2;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            top: -10%; right: -5%;
        }
        .orb-2 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, var(--accent2) 0%, transparent 70%);
            bottom: -5%; left: -5%;
        }

        /* --- Top Bar --- */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            z-index: 10;
        }

        .menu-btn {
            background: transparent;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-primary);
            transition: 0.3s;
        }
        .menu-btn:hover { color: var(--accent-glow); }

        .model-selector-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-subtle);
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 50px;
            transition: 0.3s;
            color: var(--text-primary);
        }
        .model-selector-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--glass-border); }

        .credits-badge {
            background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        /* --- Main Content --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            overflow-y: auto;
            position: relative;
            padding-top: 20px;
        }

        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .welcome-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #fff 0%, var(--accent-glow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 500px;
        }

        .chat-history {
            display: none;
            flex-direction: column;
            padding: 20px;
            gap: 24px;
        }

        .message-bubble {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.6;
            animation: fadeIn 0.4s var(--transition-smooth) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.2);
        }

        .bot-msg {
            align-self: flex-start;
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .bot-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);
            color: white;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
        }

        .bot-text-content {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            padding: 16px 20px;
            color: var(--text-primary);
            box-shadow: var(--shadow-card);
        }

        /* --- Input Container --- */
        .input-container {
            padding: 24px;
            background: linear-gradient(180deg, transparent 0%, var(--bg-deep) 50%);
        }

        .chat-input-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 24px;
            padding: 12px 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        .chat-input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.2);
        }

        .chat-input {
            flex: 1; border: none; outline: none; background: transparent;
            font-size: 16px; color: var(--text-primary); padding: 8px 0;
            resize: none; min-height: 24px; max-height: 150px;
        }
        .chat-input::placeholder { color: var(--text-tertiary); }

        .send-btn {
            background: var(--text-tertiary);
            color: var(--bg-deep);
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s var(--transition-smooth);
        }
        .send-btn.active {
            background: white;
            color: black;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        /* --- Sidebar --- */
        .sidebar {
            position: fixed; top: 0; left: -320px;
            width: 300px; height: 100%;
            background: var(--bg-surface);
            border-right: 1px solid var(--border-subtle);
            z-index: 100;
            transition: 0.4s var(--transition-smooth);
            display: flex; flex-direction: column; padding: 24px;
        }
        .sidebar.active { left: 0; }

        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px); opacity: 0; visibility: hidden;
            transition: 0.3s; z-index: 99;
        }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }

        .new-chat-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-subtle);
            padding: 14px; border-radius: 16px;
            color: white; font-weight: 600; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s; margin-bottom: 20px;
        }
        .new-chat-btn:hover { background: rgba(255,255,255,0.1); }

        .sidebar-history { flex: 1; overflow-y: auto; }
        .history-title { font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; margin-bottom: 12px; }
        
        .legal-footer-link {
            display: block; padding: 12px; color: var(--text-secondary);
            text-decoration: none; font-size: 14px; border-radius: 12px;
            transition: 0.2s; margin-bottom: 10px;
        }
        .legal-footer-link:hover { background: rgba(255,255,255,0.05); color: white; }

        .user-card {
            background: var(--bg-card);
            padding: 12px; border-radius: 16px;
            border: 1px solid var(--border-card);
            display: flex; align-items: center; gap: 12px;
        }
        .user-avatar {
            width: 36px; height: 36px; background: var(--accent);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: white;
        }
    </style>
</head>
<body>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    
    <aside class="sidebar" id="sidebar">
        <button class="new-chat-btn">
            New Chat <i class="fa-solid fa-plus"></i>
        </button>
        
        <div class="sidebar-history">
            <div class="history-title">Recent</div>
            <!-- History list -->
        </div>

        <div style="margin-top: auto;">
            <a href="Politics.html" class="legal-footer-link">
                <i class="fa-solid fa-shield-halved" style="margin-right: 8px;"></i> Privacy & Terms
            </a>
            <div class="user-card">
                <div class="user-avatar">U</div>
                <div class="user-info">
                    <div class="user-name">User</div>
                    <div class="user-email" style="font-size: 12px; color: var(--text-tertiary);">user@example.com</div>
                </div>
            </div>
        </div>
    </aside>

    <header class="top-bar">
        <button class="menu-btn" id="openSidebar">
            <i class="fa-solid fa-bars-staggered"></i>
        </button>
        <button class="model-selector-btn">GPT-4o <i class="fa-solid fa-chevron-down"></i></button>
        <div class="credits-badge">300 Credits</div>
    </header>

    <main class="main-content" id="mainContent">
        <div class="welcome-screen" id="welcomeScreen">
            <h1 class="welcome-title">How can I help you?</h1>
            <p class="welcome-subtitle">Experience the future of AI with our most advanced models.</p>
        </div>
        <div class="chat-history" id="chatHistory"></div>
    </main>

    <div class="input-container">
        <div class="chat-input-wrapper">
            <div style="display: flex; align-items: flex-end; gap: 12px;">
                <button style="background:none; border:none; color:var(--text-tertiary); cursor:pointer; padding:8px;"><i class="fa-solid fa-paperclip"></i></button>
                <textarea class="chat-input" id="chatInput" placeholder="Message Home of AI..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn"><i class="fa-solid fa-arrow-up"></i></button>
            </div>
        </div>
    </div>

    <script>
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const chatHistory = document.getElementById('chatHistory');
        const openSidebar = document.getElementById('openSidebar');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        chatInput.addEventListener('input', () => {
            sendBtn.classList.toggle('active', chatInput.value.trim() !== '');
            chatInput.style.height = 'auto';
            chatInput.style.height = chatInput.scrollHeight + 'px';
        });

        openSidebar.addEventListener('click', () => {
            sidebar.classList.add('active');
            sidebarOverlay.classList.add('active');
        });

        sidebarOverlay.addEventListener('click', () => {
            sidebar.classList.remove('active');
            sidebarOverlay.classList.remove('active');
        });

        sendBtn.addEventListener('click', () => {
            const text = chatInput.value.trim();
            if (!text) return;
            welcomeScreen.style.display = 'none';
            chatHistory.style.display = 'flex';
            const msg = document.createElement('div');
            msg.className = 'message-bubble user-msg';
            msg.textContent = text;
            chatHistory.appendChild(msg);
            chatInput.value = '';
            chatInput.style.height = 'auto';
            document.getElementById('mainContent').scrollTop = document.getElementById('mainContent').scrollHeight;
        });
    </script>
</body>
</html>
